version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: gep_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: green_energy_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - gep_network
volumes:
  mysql_data:
networks:
  gep_network:
    driver: bridge