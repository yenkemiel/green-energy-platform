<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>合約管理 - 綠電管理平台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green: #93bea1;
            --green-dark: #5a8a6e;
            --green-light: #e8f4ed;
            --red: #cd6060;
            --red-light: #fee2e2;
            --border: #e4e4e0;
            --text: #1a1a1a;
            --text-muted: #888;
            --bg: #f0f2f5;
            --card: #fff;
        }
        body { font-family: sans-serif; background: var(--bg); display: flex; min-height: 100vh; font-size: 14px; }
        .sidebar { width: 220px; background: var(--card); border-right: 1px solid var(--border); height: 100vh; position: sticky; top: 0; display: flex; flex-direction: column; }
        .logo { padding: 18px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .logo-dot { width: 9px; height: 9px; background: var(--green); border-radius: 50%; }
        .nav-section { padding: 12px 16px 4px; font-size: 10px; color: #bbb; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
        .nav-item { display: flex; align-items: center; padding: 9px 16px; font-size: 13px; color: #555; text-decoration: none; border-left: 3px solid transparent; transition: all .12s; }
        .nav-item:hover { background: #f8f8f6; color: var(--text); }
        .nav-item.active { background: var(--green-light); color: var(--green-dark); font-weight: 500; border-left-color: var(--green); }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; }
        .topbar-title { font-size: 15px; font-weight: 600; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .user-chip { display: flex; align-items: center; gap: 8px; background: #f5f5f3; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .user-avatar { width: 22px; height: 22px; background: var(--green-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--green-dark); }
        .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: 500; }
        .badge-manager { background: #ede9fe; color: #5b21b6; }
        .badge-employee { background: var(--green-light); color: var(--green-dark); }
        .badge-active { background: var(--green-light); color: var(--green-dark); }
        .badge-expired { background: #f0f0ee; color: #999; }
        .badge-terminated { background: var(--red-light); color: var(--red); }
        .badge-cppa { background: #e8f0fe; color: #1a56db; }
        .badge-retail { background: #fdf2f8; color: #9d174d; }
        .logout-btn { background: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #555; }
        .logout-btn:hover { background: #f5f5f3; }
        .content { padding: 24px; flex: 1; }
        .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
        .page-title { font-size: 18px; font-weight: 600; }
        .page-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .card-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
        td { padding: 11px 12px; border-bottom: 1px solid #f0f0ee; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafaf8; }
        .tw { overflow-x: auto; }
        .btn { display: inline-flex; align-items: center; padding: 5px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; border: 1px solid; font-weight: 500; background: none; transition: all .12s; }
        .btn-primary { background: var(--green); border-color: var(--green); color: #fff; }
        .btn-primary:hover { background: var(--green-dark); }
        .btn-outline { border-color: var(--border); color: #555; }
        .btn-outline:hover { background: #f5f5f3; }
        .btn-danger { border-color: #fca5a5; color: var(--red); }
        .btn-danger:hover { background: var(--red-light); }
        .btn-gap { display: flex; gap: 6px; }
        select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--card); color: var(--text); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--card); border-radius: 10px; padding: 24px; width: 480px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
        .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
        .form-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
        .form-input:focus { outline: none; border-color: var(--green); }
        .form-hint { font-size: 11px; color: #bbb; margin-top: 4px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
        .error-msg { color: var(--red); font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo"><div class="logo-dot"></div>綠電管理平台</div>
    <div class="nav-section">總覽</div>
    <a class="nav-item" href="/dashboard">儀表板</a>
    <div class="nav-section">資料管理</div>
    <a class="nav-item" href="/solar-devices">太陽能設備</a>
    <a class="nav-item active" href="/contracts">合約管理</a>
    <div class="nav-section">系統設定</div>
    <a class="nav-item" href="/targets">年度目標</a>
</aside>

<div class="main">
    <header class="topbar">
        <div class="topbar-title">合約管理</div>
        <div class="topbar-right">
            <div class="user-chip">
                <div class="user-avatar" id="userAvatar">-</div>
                <span id="userName">載入中</span>
                <span class="badge" id="userRole"></span>
            </div>
            <button class="logout-btn" onclick="logout()">登出</button>
        </div>
    </header>

    <div class="content">
        <div class="page-header">
            <div>
                <div class="page-title">合約管理</div>
                <div class="page-sub">CPPA 長期直購 ＆ 售電業綠電合約</div>
            </div>
            <button class="btn btn-primary" id="createBtn" style="display:none" onclick="openCreateModal()">建立合約</button>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">合約清單</div>
                <div class="filters">
                    <select id="statusFilter" onchange="loadContracts()">
                        <option value="">全部狀態</option>
                        <option value="ACTIVE">履約中</option>
                        <option value="EXPIRED">已到期</option>
                        <option value="TERMINATED">已終止</option>
                    </select>
                    <select id="typeFilter" onchange="loadContracts()">
                        <option value="">全部類型</option>
                        <option value="CPPA">CPPA</option>
                        <option value="RETAIL">RETAIL</option>
                    </select>
                </div>
            </div>
            <div class="tw">
                <table>
                    <thead>
                    <tr>
                        <th>供電業者</th>
                        <th>類型</th>
                        <th>月供電量</th>
                        <th>每度費率</th>
                        <th>月成本快照</th>
                        <th>起訖日</th>
                        <th>狀態</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="contractTable">
                    <tr><td colspan="8" style="text-align:center;color:#bbb;padding:24px">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="error-msg" id="listError"></div>
        </div>
    </div>
</div>

<!-- 建立合約 Modal -->
<div class="modal-overlay" id="createModal">
    <div class="modal">
        <div class="modal-title">建立供電合約</div>
        <div class="form-group">
            <label class="form-label">供電業者名稱</label>
            <input class="form-input" type="text" id="createSupplier" placeholder="例：台灣綠能股份有限公司">
        </div>
        <div class="form-group">
            <label class="form-label">合約類型</label>
            <select class="form-input" id="createType">
                <option value="CPPA">CPPA（長期直購）</option>
                <option value="RETAIL">RETAIL（售電業）</option>
            </select>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">每月供電量（kWh）</label>
                <input class="form-input" type="number" id="createKwh" placeholder="例：50000">
            </div>
            <div class="form-group">
                <label class="form-label">每度費率（元）</label>
                <input class="form-input" type="number" step="0.01" id="createRate" placeholder="例：3.5">
                <div class="form-hint">建立後不可修改</div>
            </div>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">合約開始日</label>
                <input class="form-input" type="date" id="createStartDate">
            </div>
            <div class="form-group">
                <label class="form-label">合約結束日</label>
                <input class="form-input" type="date" id="createEndDate">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">備註（選填）</label>
            <input class="form-input" type="text" id="createNotes" placeholder="例：第一期長約">
        </div>
        <div class="error-msg" id="createError"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('createModal')">取消</button>
            <button class="btn btn-primary" onclick="createContract()">建立</button>
        </div>
    </div>
</div>

<!-- 修改合約 Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-title">修改合約</div>
        <input type="hidden" id="editContractId">
        <div class="form-group">
            <label class="form-label">供電業者名稱</label>
            <input class="form-input" type="text" id="editSupplier">
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">每月供電量（kWh）</label>
                <input class="form-input" type="number" id="editKwh">
            </div>
            <div class="form-group">
                <label class="form-label">每度費率</label>
                <input class="form-input" type="text" id="editRateDisplay" disabled style="background:#f5f5f3;color:#999">
                <div class="form-hint">費率不可修改</div>
            </div>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">合約開始日</label>
                <input class="form-input" type="date" id="editStartDate">
            </div>
            <div class="form-group">
                <label class="form-label">合約結束日</label>
                <input class="form-input" type="date" id="editEndDate">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">備註</label>
            <input class="form-input" type="text" id="editNotes">
        </div>
        <div class="error-msg" id="editError"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('editModal')">取消</button>
            <button class="btn btn-primary" onclick="updateContract()">儲存</button>
        </div>
    </div>
</div>

<!-- 終止合約 Modal -->
<div class="modal-overlay" id="terminateModal">
    <div class="modal">
        <div class="modal-title">終止合約</div>
        <input type="hidden" id="terminateContractId">
        <div class="form-group">
            <label class="form-label">終止時間</label>
            <input class="form-input" type="datetime-local" id="terminatedAt">
        </div>
        <div class="error-msg" id="terminateError"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('terminateModal')">取消</button>
            <button class="btn btn-danger" onclick="terminateContract()">確認終止</button>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token || !['MANAGER', 'EMPLOYEE'].includes(role)) window.location.href = '/login';

    const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    const roleBadgeClass = { 'MANAGER': 'badge-manager', 'EMPLOYEE': 'badge-employee' };

    document.getElementById('userRole').textContent = role || '';
    document.getElementById('userName').textContent = role === 'MANAGER' ? '企業管理者' : '員工';
    document.getElementById('userAvatar').textContent = role ? role.charAt(0) : '-';
    document.getElementById('userRole').className = 'badge ' + (roleBadgeClass[role] || '');

    if (role === 'EMPLOYEE') {
        document.getElementById('createBtn').style.display = 'inline-flex';
    }

    const statusBadge = {
        'ACTIVE': '<span class="badge badge-active">履約中</span>',
        'EXPIRED': '<span class="badge badge-expired">已到期</span>',
        'TERMINATED': '<span class="badge badge-terminated">已終止</span>'
    };

    const typeBadge = {
        'CPPA': '<span class="badge badge-cppa">CPPA</span>',
        'RETAIL': '<span class="badge badge-retail">RETAIL</span>'
    };

    async function loadContracts() {
        const status = document.getElementById('statusFilter').value;
        const type = document.getElementById('typeFilter').value;
        let url = '/api/v1/contracts?page=0&size=50';
        if (status) url += '&status=' + status;
        if (type) url += '&contractType=' + type;

        try {
            const res = await fetch(url, { headers });
            const data = await res.json();
            if (data.success) {
                const tbody = document.getElementById('contractTable');
                if (data.data.content.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#bbb;padding:24px">尚無合約</td></tr>';
                    return;
                }
                tbody.innerHTML = data.data.content.map(c => `
                    <tr>
                        <td><strong>${c.supplierName}</strong></td>
                        <td>${typeBadge[c.contractType] || c.contractType}</td>
                        <td>${Number(c.monthlySupplyKwh).toLocaleString()} kWh</td>
                        <td>$${c.ratePerKwh}/度</td>
                        <td style="color:var(--text-muted)">$${Number(c.monthlyCostSnapshot).toLocaleString()}</td>
                        <td style="font-size:12px;color:var(--text-muted)">${c.startDate} ~ ${c.endDate}</td>
                        <td>${statusBadge[c.status] || c.status}</td>
                        <td>
                            <div class="btn-gap">
                                ${c.status === 'ACTIVE' && role === 'EMPLOYEE' ? `
                                    <button class="btn btn-outline" onclick="openEditModal(${c.id}, '${c.supplierName}', ${c.monthlySupplyKwh}, '${c.startDate}', '${c.endDate}', '${c.notes || ''}', ${c.ratePerKwh})">修改</button>
                                ` : ''}
                                ${c.status === 'ACTIVE' && role === 'MANAGER' ? `
                                    <button class="btn btn-danger" onclick="openTerminateModal(${c.id})">終止</button>
                                ` : ''}
                                ${c.status !== 'ACTIVE' ? '<span style="font-size:12px;color:#bbb">—</span>' : ''}
                            </div>
                        </td>
                    </tr>
                `).join('');
            } else {
                document.getElementById('listError').textContent = '載入失敗：' + data.message;
            }
        } catch (e) {
            document.getElementById('listError').textContent = '連線失敗';
        }
    }

    function openCreateModal() {
        document.getElementById('createError').textContent = '';
        document.getElementById('createSupplier').value = '';
        document.getElementById('createKwh').value = '';
        document.getElementById('createRate').value = '';
        document.getElementById('createStartDate').value = '';
        document.getElementById('createEndDate').value = '';
        document.getElementById('createNotes').value = '';
        document.getElementById('createModal').classList.add('show');
    }

    async function createContract() {
        const body = {
            supplierName: document.getElementById('createSupplier').value,
            contractType: document.getElementById('createType').value,
            monthlySupplyKwh: parseFloat(document.getElementById('createKwh').value),
            ratePerKwh: parseFloat(document.getElementById('createRate').value),
            startDate: document.getElementById('createStartDate').value,
            endDate: document.getElementById('createEndDate').value,
            notes: document.getElementById('createNotes').value || null
        };
        try {
            const res = await fetch('/api/v1/contracts', { method: 'POST', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.success) {
                closeModal('createModal');
                loadContracts();
            } else {
                document.getElementById('createError').textContent = data.message || '建立失敗';
            }
        } catch (e) {
            document.getElementById('createError').textContent = '連線失敗';
        }
    }

    function openEditModal(id, supplier, kwh, startDate, endDate, notes, rate) {
        document.getElementById('editContractId').value = id;
        document.getElementById('editSupplier').value = supplier;
        document.getElementById('editKwh').value = kwh;
        document.getElementById('editStartDate').value = startDate;
        document.getElementById('editEndDate').value = endDate;
        document.getElementById('editNotes').value = notes;
        document.getElementById('editRateDisplay').value = '$' + rate + '/度';
        document.getElementById('editError').textContent = '';
        document.getElementById('editModal').classList.add('show');
    }

    async function updateContract() {
        const id = document.getElementById('editContractId').value;
        const body = {
            supplierName: document.getElementById('editSupplier').value,
            monthlySupplyKwh: parseFloat(document.getElementById('editKwh').value),
            startDate: document.getElementById('editStartDate').value,
            endDate: document.getElementById('editEndDate').value,
            notes: document.getElementById('editNotes').value || null
        };
        try {
            const res = await fetch('/api/v1/contracts/' + id, { method: 'PUT', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.success) {
                closeModal('editModal');
                loadContracts();
            } else {
                document.getElementById('editError').textContent = data.message || '修改失敗';
            }
        } catch (e) {
            document.getElementById('editError').textContent = '連線失敗';
        }
    }

    function openTerminateModal(id) {
        document.getElementById('terminateContractId').value = id;
        document.getElementById('terminatedAt').value = new Date().toISOString().slice(0, 16);
        document.getElementById('terminateError').textContent = '';
        document.getElementById('terminateModal').classList.add('show');
    }

    async function terminateContract() {
        const id = document.getElementById('terminateContractId').value;
        const terminatedAt = document.getElementById('terminatedAt').value + ':00';
        const body = { terminatedAt };
        try {
            const res = await fetch('/api/v1/contracts/' + id + '/terminate', { method: 'POST', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.success) {
                closeModal('terminateModal');
                loadContracts();
            } else {
                document.getElementById('terminateError').textContent = data.message || '終止失敗';
            }
        } catch (e) {
            document.getElementById('terminateError').textContent = '連線失敗';
        }
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/login';
    }

    loadContracts();
</script>
</body>
</html>
