<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>太陽能設備 - 綠電管理平台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green: #93bea1;
            --green-dark: #5a8a6e;
            --green-light: #e8f4ed;
            --red: #cd6060;
            --red-light: #fee2e2;
            --amber: #EF9F27;
            --amber-light: #fff0cc;
            --border: #e4e4e0;
            --text: #1a1a1a;
            --text-muted: #888;
            --bg: #f0f2f5;
            --card: #fff;
        }
        body { font-family: sans-serif; background: var(--bg); display: flex; min-height: 100vh; font-size: 14px; }
        .sidebar { width: 220px; background: var(--card); border-right: 1px solid var(--border); height: 100vh; position: sticky; top: 0; display: flex; flex-direction: column; }
        .logo { padding: 18px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .logo-dot { width: 9px; height: 9px; background: var(--green); border-radius: 50%; }
        .nav-section { padding: 12px 16px 4px; font-size: 10px; color: #bbb; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
        .nav-item { display: flex; align-items: center; padding: 9px 16px; font-size: 13px; color: #555; text-decoration: none; border-left: 3px solid transparent; transition: all .12s; }
        .nav-item:hover { background: #f8f8f6; color: var(--text); }
        .nav-item.active { background: var(--green-light); color: var(--green-dark); font-weight: 500; border-left-color: var(--green); }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; }
        .topbar-title { font-size: 15px; font-weight: 600; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .user-chip { display: flex; align-items: center; gap: 8px; background: #f5f5f3; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .user-avatar { width: 22px; height: 22px; background: var(--green-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--green-dark); }
        .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: 500; }
        .badge-manager { background: #ede9fe; color: #5b21b6; }
        .badge-employee { background: var(--green-light); color: var(--green-dark); }
        .badge-active { background: var(--green-light); color: var(--green-dark); }
        .badge-inactive { background: #f0f0ee; color: #999; }
        .logout-btn { background: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #555; }
        .logout-btn:hover { background: #f5f5f3; }
        .content { padding: 24px; flex: 1; }
        .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
        .page-title { font-size: 18px; font-weight: 600; }
        .page-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .card-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }
        .card-subtitle { font-size: 14px; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
        td { padding: 11px 12px; border-bottom: 1px solid #f0f0ee; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafaf8; }
        .btn { display: inline-flex; align-items: center; padding: 5px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; border: 1px solid; font-weight: 500; background: none; transition: all .12s; }
        .btn-primary { background: var(--green); border-color: var(--green); color: #fff; }
        .btn-primary:hover { background: var(--green-dark); }
        .btn-outline { border-color: var(--border); color: #555; }
        .btn-outline:hover { background: #f5f5f3; }
        .btn-danger { border-color: #fca5a5; color: var(--red); }
        .btn-danger:hover { background: var(--red-light); }
        .btn-gap { display: flex; gap: 6px; }
        select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--card); color: var(--text); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--card); border-radius: 10px; padding: 24px; width: 440px; max-width: 90vw; }
        .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
        .form-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
        .form-input:focus { outline: none; border-color: var(--green); }
        .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
        .error-msg { color: var(--red); font-size: 12px; margin-top: 8px; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); cursor: pointer; margin-bottom: 16px; background: none; border: none; padding: 0; }
        .back-btn:hover { color: var(--text); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo"><div class="logo-dot"></div>綠電管理平台</div>
    <div class="nav-section">總覽</div>
    <a class="nav-item" href="/dashboard">儀表板</a>
    <div class="nav-section">資料管理</div>
    <a class="nav-item active" href="/solar-devices">太陽能設備</a>
    <a class="nav-item" href="/contracts">合約管理</a>
    <div class="nav-section">系統設定</div>
    <a class="nav-item" href="/targets">年度目標</a>
</aside>

<div class="main">
    <header class="topbar">
        <div class="topbar-title" id="topbarTitle">太陽能設備</div>
        <div class="topbar-right">
            <div class="user-chip">
                <div class="user-avatar" id="userAvatar">-</div>
                <span id="userName">載入中</span>
                <span class="badge" id="userRole"></span>
            </div>
            <button class="logout-btn" onclick="logout()">登出</button>
        </div>
    </header>

    <div class="content">

        <!-- 設備清單 -->
        <div id="deviceView">
            <div class="page-header">
                <div>
                    <div class="page-title">太陽能設備管理</div>
                    <div class="page-sub">設備清單與每月發電紀錄</div>
                </div>
                <button class="btn btn-primary" id="createDeviceBtn" style="display:none" onclick="openCreateDeviceModal()">新增設備</button>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">設備清單</div>
                    <select id="statusFilter" onchange="loadDevices()">
                        <option value="">全部狀態</option>
                        <option value="ACTIVE">運作中</option>
                        <option value="INACTIVE">停用</option>
                    </select>
                </div>
                <table>
                    <thead>
                    <tr>
                        <th>設備名稱</th>
                        <th>容量（kW）</th>
                        <th>安裝日期</th>
                        <th>位置</th>
                        <th>狀態</th>
                        <th>理論月發電</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="deviceTable">
                    <tr><td colspan="7" style="text-align:center;color:#bbb;padding:24px">載入中...</td></tr>
                    </tbody>
                </table>
                <div class="error-msg" id="deviceError"></div>
            </div>
        </div>

        <!-- 月發電紀錄 -->
        <div id="recordView" style="display:none">
            <button class="back-btn" onclick="showDeviceView()">← 返回設備清單</button>
            <div class="page-header">
                <div>
                    <div class="page-title" id="recordTitle">月發電紀錄</div>
                    <div class="page-sub">每月實際發電量登記</div>
                </div>
                <div style="display:flex;gap:8px;align-items:center">
                    <select id="yearFilter" onchange="loadRecords()">
                        <option value="2026">2026 年</option>
                        <option value="2025">2025 年</option>
                    </select>
                    <button class="btn btn-primary" id="createRecordBtn" style="display:none" onclick="openCreateRecordModal()">登記發電量</button>
                </div>
            </div>

            <div class="card">
                <table>
                    <thead>
                    <tr>
                        <th>年月</th>
                        <th>實際發電量</th>
                        <th>理論發電量</th>
                        <th>達標率</th>
                        <th>登記人</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="recordTable">
                    <tr><td colspan="6" style="text-align:center;color:#bbb;padding:24px">載入中...</td></tr>
                    </tbody>
                </table>
                <div class="error-msg" id="recordError"></div>
            </div>
        </div>
    </div>
</div>

<!-- 新增設備 Modal -->
<div class="modal-overlay" id="createDeviceModal">
    <div class="modal">
        <div class="modal-title">新增太陽能設備</div>
        <div class="form-group">
            <label class="form-label">設備名稱</label>
            <input class="form-input" type="text" id="deviceName" placeholder="例：廠房A屋頂太陽能">
        </div>
        <div class="form-group">
            <label class="form-label">裝置容量（kW）</label>
            <input class="form-input" type="number" step="0.1" id="deviceCapacity" placeholder="例：50.0">
        </div>
        <div class="form-group">
            <label class="form-label">安裝日期</label>
            <input class="form-input" type="date" id="deviceInstallDate">
        </div>
        <div class="form-group">
            <label class="form-label">安裝位置</label>
            <input class="form-input" type="text" id="deviceLocation" placeholder="例：台中廠A棟屋頂">
        </div>
        <div class="error-msg" id="createDeviceError"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('createDeviceModal')">取消</button>
            <button class="btn btn-primary" onclick="createDevice()">新增</button>
        </div>
    </div>
</div>

<!-- 修改狀態 Modal -->
<div class="modal-overlay" id="statusModal">
    <div class="modal">
        <div class="modal-title">修改設備狀態</div>
        <input type="hidden" id="statusDeviceId">
        <div class="form-group">
            <label class="form-label">狀態</label>
            <select class="form-input" id="deviceStatus">
                <option value="ACTIVE">運作中</option>
                <option value="INACTIVE">停用</option>
            </select>
        </div>
        <div class="error-msg" id="statusError"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('statusModal')">取消</button>
            <button class="btn btn-primary" onclick="updateStatus()">儲存</button>
        </div>
    </div>
</div>

<!-- 登記發電量 Modal -->
<div class="modal-overlay" id="createRecordModal">
    <div class="modal">
        <div class="modal-title">登記月發電量</div>
        <div class="form-group">
            <label class="form-label">年份</label>
            <input class="form-input" type="number" id="recordYear" placeholder="例：2026">
        </div>
        <div class="form-group">
            <label class="form-label">月份</label>
            <select class="form-input" id="recordMonth">
                <option value="1">1 月</option>
                <option value="2">2 月</option>
                <option value="3">3 月</option>
                <option value="4">4 月</option>
                <option value="5">5 月</option>
                <option value="6">6 月</option>
                <option value="7">7 月</option>
                <option value="8">8 月</option>
                <option value="9">9 月</option>
                <option value="10">10 月</option>
                <option value="11">11 月</option>
                <option value="12">12 月</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">實際發電量（kWh）</label>
            <input class="form-input" type="number" id="recordKwh" placeholder="例：13200">
        </div>
        <div class="error-msg" id="createRecordError"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('createRecordModal')">取消</button>
            <button class="btn btn-primary" onclick="createRecord()">登記</button>
        </div>
    </div>
</div>

<!-- 修改發電量 Modal -->
<div class="modal-overlay" id="editRecordModal">
    <div class="modal">
        <div class="modal-title">修改發電量</div>
        <input type="hidden" id="editRecordId">
        <div class="form-group">
            <label class="form-label">實際發電量（kWh）</label>
            <input class="form-input" type="number" id="editRecordKwh">
        </div>
        <div class="error-msg" id="editRecordError"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('editRecordModal')">取消</button>
            <button class="btn btn-primary" onclick="updateRecord()">儲存</button>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token || !['MANAGER', 'EMPLOYEE'].includes(role)) window.location.href = '/login';

    const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    const roleBadgeClass = { 'MANAGER': 'badge-manager', 'EMPLOYEE': 'badge-employee' };

    document.getElementById('userRole').textContent = role || '';
    document.getElementById('userName').textContent = role === 'MANAGER' ? '企業管理者' : '員工';
    document.getElementById('userAvatar').textContent = role ? role.charAt(0) : '-';
    document.getElementById('userRole').className = 'badge ' + (roleBadgeClass[role] || '');

    if (role === 'EMPLOYEE') {
        document.getElementById('createDeviceBtn').style.display = 'inline-flex';
        document.getElementById('createRecordBtn').style.display = 'inline-flex';
    }

    let currentDeviceId = null;
    let currentTheoreticalKwh = null;

    async function loadDevices() {
        const statusFilter = document.getElementById('statusFilter').value;
        const url = '/api/v1/solar-devices?page=0&size=50' + (statusFilter ? '&status=' + statusFilter : '');
        try {
            const res = await fetch(url, { headers });
            const data = await res.json();
            if (data.success) {
                const tbody = document.getElementById('deviceTable');
                if (data.data.content.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#bbb;padding:24px">尚無設備</td></tr>';
                    return;
                }
                tbody.innerHTML = data.data.content.map(d => `
                    <tr>
                        <td><strong>${d.deviceName}</strong></td>
                        <td>${d.capacityKw} kW</td>
                        <td style="color:#bbb;font-size:12px">${d.installDate || '-'}</td>
                        <td style="color:var(--text-muted)">${d.location || '-'}</td>
                        <td>${d.status === 'ACTIVE'
                    ? '<span class="badge badge-active">運作中</span>'
                    : '<span class="badge badge-inactive">停用</span>'}</td>
                        <td>${d.theoreticalMonthlyKwh ? Number(d.theoreticalMonthlyKwh).toLocaleString() + ' kWh' : '-'}</td>
                        <td>
                            <div class="btn-gap">
                                <button class="btn btn-outline" onclick="showRecordView(${d.id}, '${d.deviceName}', ${d.theoreticalMonthlyKwh || 0})">月紀錄</button>
                                ${role === 'EMPLOYEE' ? `<button class="btn btn-outline" onclick="openStatusModal(${d.id}, '${d.status}')">修改狀態</button>` : ''}
                            </div>
                        </td>
                    </tr>
                `).join('');
            }
        } catch (e) {
            document.getElementById('deviceError').textContent = '連線失敗';
        }
    }

    function showRecordView(deviceId, deviceName, theoreticalKwh) {
        currentDeviceId = deviceId;
        currentTheoreticalKwh = theoreticalKwh;
        document.getElementById('recordTitle').textContent = deviceName + ' · 月發電紀錄';
        document.getElementById('topbarTitle').textContent = deviceName;
        document.getElementById('deviceView').style.display = 'none';
        document.getElementById('recordView').style.display = 'block';
        loadRecords();
    }

    function showDeviceView() {
        document.getElementById('deviceView').style.display = 'block';
        document.getElementById('recordView').style.display = 'none';
        document.getElementById('topbarTitle').textContent = '太陽能設備';
    }

    async function loadRecords() {
        const year = document.getElementById('yearFilter').value;
        try {
            const res = await fetch(`/api/v1/solar-devices/${currentDeviceId}/monthly-records?year=${year}`, { headers });
            const data = await res.json();
            if (data.success) {
                const tbody = document.getElementById('recordTable');
                if (data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#bbb;padding:24px">尚無紀錄</td></tr>';
                    return;
                }
                tbody.innerHTML = data.data.map(r => {
                    const rate = currentTheoreticalKwh > 0
                        ? Math.round((r.actualKwh / currentTheoreticalKwh) * 100) + '%'
                        : '-';
                    return `
                        <tr>
                            <td>${r.recordYear}-${String(r.recordMonth).padStart(2, '0')}</td>
                            <td><strong>${Number(r.actualKwh).toLocaleString()} kWh</strong></td>
                            <td style="color:var(--text-muted)">${currentTheoreticalKwh ? Number(currentTheoreticalKwh).toLocaleString() + ' kWh' : '-'}</td>
                            <td style="color:var(--green-dark);font-weight:500">${rate}</td>
                            <td style="color:var(--text-muted);font-size:12px">${r.createdAt ? r.createdAt.substring(0, 10) : '-'}</td>
                            <td>
                                ${role === 'EMPLOYEE' ? `
                                <button class="btn btn-outline" onclick="openEditRecordModal(${r.id}, ${r.actualKwh})">修改</button>` : '<span style="font-size:12px;color:#bbb">僅供查看</span>'}
                            </td>
                        </tr>
                    `;
                }).join('');
            }
        } catch (e) {
            document.getElementById('recordError').textContent = '連線失敗';
        }
    }

    function openCreateDeviceModal() {
        document.getElementById('createDeviceError').textContent = '';
        document.getElementById('createDeviceModal').classList.add('show');
    }

    async function createDevice() {
        const body = {
            deviceName: document.getElementById('deviceName').value,
            capacityKw: parseFloat(document.getElementById('deviceCapacity').value),
            installDate: document.getElementById('deviceInstallDate').value,
            location: document.getElementById('deviceLocation').value
        };
        try {
            const res = await fetch('/api/v1/solar-devices', { method: 'POST', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.success) {
                closeModal('createDeviceModal');
                loadDevices();
            } else {
                document.getElementById('createDeviceError').textContent = data.message || '新增失敗';
            }
        } catch (e) {
            document.getElementById('createDeviceError').textContent = '連線失敗';
        }
    }

    function openStatusModal(id, currentStatus) {
        document.getElementById('statusDeviceId').value = id;
        document.getElementById('deviceStatus').value = currentStatus;
        document.getElementById('statusError').textContent = '';
        document.getElementById('statusModal').classList.add('show');
    }

    async function updateStatus() {
        const id = document.getElementById('statusDeviceId').value;
        const body = { status: document.getElementById('deviceStatus').value };
        try {
            const res = await fetch('/api/v1/solar-devices/' + id + '/status', { method: 'PATCH', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.success) {
                closeModal('statusModal');
                loadDevices();
            } else {
                document.getElementById('statusError').textContent = data.message || '修改失敗';
            }
        } catch (e) {
            document.getElementById('statusError').textContent = '連線失敗';
        }
    }

    function openCreateRecordModal() {
        document.getElementById('createRecordError').textContent = '';
        document.getElementById('recordYear').value = new Date().getFullYear();
        document.getElementById('createRecordModal').classList.add('show');
    }

    async function createRecord() {
        const body = {
            recordYear: parseInt(document.getElementById('recordYear').value),
            recordMonth: parseInt(document.getElementById('recordMonth').value),
            actualKwh: parseFloat(document.getElementById('recordKwh').value)
        };
        try {
            const res = await fetch(`/api/v1/solar-devices/${currentDeviceId}/monthly-records`, { method: 'POST', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.success) {
                closeModal('createRecordModal');
                loadRecords();
            } else {
                document.getElementById('createRecordError').textContent = data.message || '登記失敗';
            }
        } catch (e) {
            document.getElementById('createRecordError').textContent = '連線失敗';
        }
    }

    function openEditRecordModal(id, kwh) {
        document.getElementById('editRecordId').value = id;
        document.getElementById('editRecordKwh').value = kwh;
        document.getElementById('editRecordError').textContent = '';
        document.getElementById('editRecordModal').classList.add('show');
    }

    async function updateRecord() {
        const recordId = document.getElementById('editRecordId').value;
        const body = { actualKwh: parseFloat(document.getElementById('editRecordKwh').value) };
        try {
            const res = await fetch(`/api/v1/solar-devices/${currentDeviceId}/monthly-records/${recordId}`, { method: 'PUT', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.success) {
                closeModal('editRecordModal');
                loadRecords();
            } else {
                document.getElementById('editRecordError').textContent = data.message || '修改失敗';
            }
        } catch (e) {
            document.getElementById('editRecordError').textContent = '連線失敗';
        }
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/login';
    }

    loadDevices();
</script>
</body>
</html>
