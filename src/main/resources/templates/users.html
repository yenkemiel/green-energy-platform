<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>使用者管理 - 綠電管理平台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green: #93bea1;
            --green-dark: #5a8a6e;
            --green-light: #e8f4ed;
            --red: #cd6060;
            --red-light: #fee2e2;
            --amber: #EF9F27;
            --amber-light: #fff0cc;
            --border: #e4e4e0;
            --text: #1a1a1a;
            --text-muted: #888;
            --bg: #f0f2f5;
            --card: #fff;
        }
        body { font-family: sans-serif; background: var(--bg); display: flex; min-height: 100vh; font-size: 14px; }
        .sidebar { width: 220px; background: var(--card); border-right: 1px solid var(--border); height: 100vh; position: sticky; top: 0; display: flex; flex-direction: column; }
        .logo { padding: 18px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .logo-dot { width: 9px; height: 9px; background: var(--green); border-radius: 50%; }
        .nav-section { padding: 12px 16px 4px; font-size: 10px; color: #bbb; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
        .nav-item { display: flex; align-items: center; padding: 9px 16px; font-size: 13px; color: #555; text-decoration: none; border-left: 3px solid transparent; transition: all .12s; }
        .nav-item:hover { background: #f8f8f6; color: var(--text); }
        .nav-item.active { background: var(--green-light); color: var(--green-dark); font-weight: 500; border-left-color: var(--green); }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; }
        .topbar-title { font-size: 15px; font-weight: 600; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .user-chip { display: flex; align-items: center; gap: 8px; background: #f5f5f3; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .user-avatar { width: 22px; height: 22px; background: #fff1f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #881337; }
        .logout-btn { background: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #555; }
        .logout-btn:hover { background: #f5f5f3; }
        .content { padding: 24px; flex: 1; }
        .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
        .page-title { font-size: 18px; font-weight: 600; }
        .page-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .card-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
        td { padding: 11px 12px; border-bottom: 1px solid #f0f0ee; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafaf8; }
        .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: 500; }
        .badge-admin { background: #fff1f2; color: #881337; }
        .badge-manager { background: #ede9fe; color: #5b21b6; }
        .badge-employee { background: var(--green-light); color: var(--green-dark); }
        .badge-active { background: var(--green-light); color: var(--green-dark); }
        .badge-inactive { background: #f0f0ee; color: #999; }
        .btn { display: inline-flex; align-items: center; padding: 5px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; border: 1px solid; font-weight: 500; background: none; transition: all .12s; }
        .btn-primary { background: var(--green); border-color: var(--green); color: #fff; }
        .btn-primary:hover { background: var(--green-dark); }
        .btn-outline { border-color: var(--border); color: #555; }
        .btn-outline:hover { background: #f5f5f3; }
        .btn-danger { border-color: #fca5a5; color: var(--red); }
        .btn-danger:hover { background: var(--red-light); }
        .btn-warn { border-color: #fcd34d; color: #92400e; }
        .btn-warn:hover { background: var(--amber-light); }
        .btn-gap { display: flex; gap: 6px; }
        select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--card); color: var(--text); }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--card); border-radius: 10px; padding: 24px; width: 420px; max-width: 90vw; }
        .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
        .form-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
        .form-input:focus { outline: none; border-color: var(--green); }
        .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
        .error-msg { color: var(--red); font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo"><div class="logo-dot"></div>綠電管理平台</div>
    <div class="nav-section">系統管理</div>
    <a class="nav-item active" href="/users">使用者管理</a>
</aside>

<div class="main">
    <header class="topbar">
        <div class="topbar-title">使用者管理</div>
        <div class="topbar-right">
            <div class="user-chip">
                <div class="user-avatar">A</div>
                <span>系統管理者</span>
                <span class="badge badge-admin">ADMIN</span>
            </div>
            <button class="logout-btn" onclick="logout()">登出</button>
        </div>
    </header>

    <div class="content">
        <div class="page-header">
            <div>
                <div class="page-title">使用者管理</div>
                <div class="page-sub">帳號清單與狀態管理</div>
            </div>
            <button class="btn btn-primary" onclick="openCreateModal()">建立帳號</button>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">使用者清單</div>
                <select id="roleFilter" onchange="loadUsers()">
                    <option value="">全部角色</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="MANAGER">MANAGER</option>
                    <option value="EMPLOYEE">EMPLOYEE</option>
                </select>
            </div>
            <table>
                <thead>
                <tr>
                    <th>帳號</th>
                    <th>顯示名稱</th>
                    <th>角色</th>
                    <th>狀態</th>
                    <th>建立時間</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="userTable">
                <tr><td colspan="6" style="text-align:center;color:#bbb;padding:24px">載入中...</td></tr>
                </tbody>
            </table>
            <div class="error-msg" id="listError"></div>
        </div>
    </div>
</div>

<!-- 建立帳號 Modal -->
<div class="modal-overlay" id="createModal">
    <div class="modal">
        <div class="modal-title">建立帳號</div>
        <div class="form-group">
            <label class="form-label">帳號（username）</label>
            <input class="form-input" type="text" id="createUsername" placeholder="例：employee02">
        </div>
        <div class="form-group">
            <label class="form-label">顯示名稱</label>
            <input class="form-input" type="text" id="createDisplayName" placeholder="例：李小華">
        </div>
        <div class="form-group">
            <label class="form-label">初始密碼</label>
            <input class="form-input" type="password" id="createPassword" placeholder="至少 8 碼">
        </div>
        <div class="form-group">
            <label class="form-label">角色</label>
            <select class="form-input" id="createRole">
                <option value="EMPLOYEE">EMPLOYEE</option>
                <option value="MANAGER">MANAGER</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </div>
        <div class="error-msg" id="createError"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('createModal')">取消</button>
            <button class="btn btn-primary" onclick="createUser()">建立</button>
        </div>
    </div>
</div>

<!-- 修改資料 Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-title">修改使用者資料</div>
        <input type="hidden" id="editUserId">
        <div class="form-group">
            <label class="form-label">顯示名稱</label>
            <input class="form-input" type="text" id="editDisplayName">
        </div>
        <div class="form-group">
            <label class="form-label">角色</label>
            <select class="form-input" id="editRole">
                <option value="EMPLOYEE">EMPLOYEE</option>
                <option value="MANAGER">MANAGER</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </div>
        <div class="error-msg" id="editError"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('editModal')">取消</button>
            <button class="btn btn-primary" onclick="updateUser()">儲存</button>
        </div>
    </div>
</div>

<!-- 重設密碼 Modal -->
<div class="modal-overlay" id="passwordModal">
    <div class="modal">
        <div class="modal-title">重設密碼</div>
        <input type="hidden" id="passwordUserId">
        <div class="form-group">
            <label class="form-label">新密碼</label>
            <input class="form-input" type="password" id="newPassword" placeholder="至少 8 碼">
        </div>
        <div class="error-msg" id="passwordError"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('passwordModal')">取消</button>
            <button class="btn btn-primary" onclick="resetPassword()">確認重設</button>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token || role !== 'ADMIN') window.location.href = '/login';

    const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

    const roleBadge = {
        'ADMIN': '<span class="badge badge-admin">ADMIN</span>',
        'MANAGER': '<span class="badge badge-manager">MANAGER</span>',
        'EMPLOYEE': '<span class="badge badge-employee">EMPLOYEE</span>'
    };

    async function loadUsers() {
        const roleFilter = document.getElementById('roleFilter').value;
        const url = '/api/v1/users?page=0&size=50' + (roleFilter ? '&role=' + roleFilter : '');
        try {
            const res = await fetch(url, { headers });
            const data = await res.json();
            if (data.success) {
                const tbody = document.getElementById('userTable');
                tbody.innerHTML = data.data.content.map(u => `
                    <tr>
                        <td><strong>${u.username}</strong></td>
                        <td>${u.displayName}</td>
                        <td>${roleBadge[u.role] || u.role}</td>
                        <td>${u.isActive
                    ? '<span class="badge badge-active">啟用</span>'
                    : '<span class="badge badge-inactive">停用</span>'}</td>
                        <td style="color:#bbb;font-size:12px">${u.createdAt ? u.createdAt.substring(0, 10) : '-'}</td>
                        <td>
                            ${u.role === 'ADMIN' ? '<span style="font-size:12px;color:#bbb">不可修改</span>' : `
                            <div class="btn-gap">
                                <button class="btn btn-outline" onclick="openEditModal(${u.id}, '${u.displayName}', '${u.role}')">修改</button>
                                <button class="btn ${u.isActive ? 'btn-danger' : 'btn-outline'}" onclick="toggleStatus(${u.id}, ${u.isActive})">
                                    ${u.isActive ? '停用' : '啟用'}
                                </button>
                                <button class="btn btn-warn" onclick="openPasswordModal(${u.id})">重設密碼</button>
                            </div>`}
                        </td>
                    </tr>
                `).join('');
            } else {
                document.getElementById('listError').textContent = '載入失敗：' + data.message;
            }
        } catch (e) {
            document.getElementById('listError').textContent = '連線失敗';
        }
    }

    function openCreateModal() {
        document.getElementById('createError').textContent = '';
        document.getElementById('createUsername').value = '';
        document.getElementById('createDisplayName').value = '';
        document.getElementById('createPassword').value = '';
        document.getElementById('createModal').classList.add('show');
    }

    async function createUser() {
        const body = {
            username: document.getElementById('createUsername').value,
            displayName: document.getElementById('createDisplayName').value,
            password: document.getElementById('createPassword').value,
            role: document.getElementById('createRole').value
        };
        try {
            const res = await fetch('/api/v1/users', { method: 'POST', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.success) {
                closeModal('createModal');
                loadUsers();
            } else {
                document.getElementById('createError').textContent = data.message || '建立失敗';
            }
        } catch (e) {
            document.getElementById('createError').textContent = '連線失敗';
        }
    }

    function openEditModal(id, displayName, role) {
        document.getElementById('editUserId').value = id;
        document.getElementById('editDisplayName').value = displayName;
        document.getElementById('editRole').value = role;
        document.getElementById('editError').textContent = '';
        document.getElementById('editModal').classList.add('show');
    }

    async function updateUser() {
        const id = document.getElementById('editUserId').value;
        const body = {
            displayName: document.getElementById('editDisplayName').value,
            role: document.getElementById('editRole').value
        };
        try {
            const res = await fetch('/api/v1/users/' + id, { method: 'PUT', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.success) {
                closeModal('editModal');
                loadUsers();
            } else {
                document.getElementById('editError').textContent = data.message || '修改失敗';
            }
        } catch (e) {
            document.getElementById('editError').textContent = '連線失敗';
        }
    }

    async function toggleStatus(id, isActive) {
        try {
            const res = await fetch('/api/v1/users/' + id + '/status', {
                method: 'PATCH',
                headers,
                body: JSON.stringify({ isActive: !isActive })
            });
            const data = await res.json();
            if (data.success) {
                loadUsers();
            }
        } catch (e) {}
    }

    function openPasswordModal(id) {
        document.getElementById('passwordUserId').value = id;
        document.getElementById('newPassword').value = '';
        document.getElementById('passwordError').textContent = '';
        document.getElementById('passwordModal').classList.add('show');
    }

    async function resetPassword() {
        const id = document.getElementById('passwordUserId').value;
        const body = { newPassword: document.getElementById('newPassword').value };
        try {
            const res = await fetch('/api/v1/users/' + id + '/password', { method: 'PUT', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.success) {
                closeModal('passwordModal');
            } else {
                document.getElementById('passwordError').textContent = data.message || '重設失敗';
            }
        } catch (e) {
            document.getElementById('passwordError').textContent = '連線失敗';
        }
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/login';
    }

    loadUsers();
</script>
</body>
</html>
